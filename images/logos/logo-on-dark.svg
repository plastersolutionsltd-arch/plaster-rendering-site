    text-anchor="middle">SOLUTIONS</text>

  <!-- PLASTER RENDER SPECIALISTS -->
  <text x="260" y="224"
    font-family="'Bebas Neue', Impact, Arial Narrow, sans-serif"
    font-size="11"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="4"
